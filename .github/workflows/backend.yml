name: Backend Pipeline

on:
  push:
    paths:
      - 'app/backend/**'
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/princemelane/major-assignment-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app/backend
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }},${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Install Helm
        run: |
          curl -fsSL https://get.helm.sh/helm-v3.20.2-linux-amd64.tar.gz -o helm.tar.gz
          tar -zxvf helm.tar.gz
          mkdir -p ~/.local/bin
          mv linux-amd64/helm ~/.local/bin/helm
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Deploy backend with Helm
        run: |
          helm upgrade --install major-assignment ./helm \
            --set backend.image.tag=${{ github.sha }} \
            --set backend.image.repository=ghcr.io/princemelane/major-assignment-backend \
            --namespace default \
            --wait